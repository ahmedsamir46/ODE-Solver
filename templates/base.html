<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODE Solver | Professional Numerical Analysis</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">ODE Solver</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'documentation' %}active{% endif %}" href="/documentation">Documentation</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <a href="https://github.com/ahmedsamir46/ODE-Solver" class="btn btn-outline-light me-2" target="_blank">
                        <i class="bi bi-github"></i> GitHub
                    </a>
                </div>
            </div>
        </div>
    </nav>
    
    {% block content %}
    {% endblock %}
    
    <footer class="footer mt-5 pb-5 pt-3">
        <div class="container text-center">
            <hr class="mb-4 opacity-10">
            <div class="row align-items-center">
                <div class="col-md-6 text-md-start mb-3 mb-md-0">
                    <p class="mb-0 text-muted small">ODE BVP Solver &copy; 2025 | Developed by Ahmed Samir</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="/license" class="text-muted text-decoration-none small mx-2">License</a>
                    <a href="https://github.com/ahmedsamir46/ODE-Solver/issues" class="text-muted text-decoration-none small mx-2" target="_blank">Support</a>
                    <a href="/documentation" class="text-muted text-decoration-none small mx-2">Docs</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    
    {% if request.endpoint == 'documentation' %}
    <script>
        // Enable scrollspy for documentation page
        document.addEventListener('DOMContentLoaded', function() {
            if (document.getElementById('navbar-docs')) {
                const scrollSpy = new bootstrap.ScrollSpy(document.body, {
                    target: '#navbar-docs',
                    offset: 100
                });
            }
        });
    </script>
    {% endif %}
</body>
</html>
